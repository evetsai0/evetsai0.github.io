<!DOCTYPE html>
<html>
<head>
<style type='text/css'>
  #closed{
    position: absolute;
    top: 0px;
    left: 20%;
    opacity: 1;
    -webkit-transition: all 1s ease;
    -moz-transition: all 1s ease;
    -ms-transition: all 1s ease;
    -o-transition: all 1s ease;
    transition: all 1s ease;
  }

  #opened {
    position: absolute;
    top: 0px;
    left: 20%;
    opacity: 0;
    -webkit-transition: all 1s ease;
    -moz-transition: all 1s ease;
    -ms-transition: all 1s ease;
    -o-transition: all 1s ease;
    transition: all 1s ease;
  }

  #mag{
    font-size: 10em;
    display: inline-block;
    width: 0.4em;
    box-sizing: content-box;
    height: 0.4em;
    border: 0.1em solid red;
    position: relative;
    border-radius: 0.35em;
  }
  #mag:before{
    content: "";
    display: inline-block;
    position: absolute;
    right: -0.25em;
    bottom: -0.1em;
    border-width: 0;
    background: red;
    width: 0.35em;
    height: 0.08em;
    transform: rotate(45deg);
  }
  .magnify{
    transform: scale(0.3);
    transform-origin: bottom left;
    position: absolute;
    top:50%;
    left: 60%;
  }

</style>
</head>

<body>
  <script>
  var isOpen = false;

  function reactfridge() {
    var closed = document.getElementById("closed");
    var opened = document.getElementById("opened");

    if (isOpen) {
      closed.style.opacity = '1';
      opened.style.opacity = '0';
      isOpen = false;
    } else {
      closed.style.opacity = '0';
      opened.style.opacity = '1';
      isOpen = true;
    }
  }
</script>
</body>
<div onclick='reactfridge()'>
<!--   <img src='images/closed.png' id='closed'>
  <img src='images/opened.png' id='opened'> -->
</div>
<div class='magnify' ><div id="mag"></div></div>
<!-- <div id="magnifying-glassb"></div> -->


</html>
